<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VerifiQuant Frontend Console</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <div class="app-container">
      <header>
        <h1>VerifiQuant Memoryless QA Console</h1>
        <p>入口固定使用 <code>question + context</code>。若被攔截，先依 repair guide 修正後再重送。</p>
      </header>
      <nav class="tab-nav">
        <button id="tab-qa" class="tab-btn active" type="button">主問答介面</button>
        <button id="tab-cards" class="tab-btn" type="button">卡片一覽表</button>
      </nav>

      <section id="panel-qa" class="panel active">
        <form id="question-form">
          <label>
            Question
            <textarea id="question" name="question" rows="4" placeholder="例如：請計算這筆投資的 NPV" required></textarea>
          </label>
          <label>
            Context
            <textarea id="context" name="context" rows="8" placeholder='建議使用 JSON，例如：{"initial_investment":100000,"cash_flows":[30000,40000,50000],"discount_rate":0.1}'></textarea>
          </label>
          <div class="inline-row">
            <label>
              Domain (optional)
              <input id="domain" name="domain" type="text" placeholder="investment_analysis" />
            </label>
            <label>
              Topic (optional)
              <input id="topic" name="topic" type="text" placeholder="npv" />
            </label>
          </div>
          <button type="submit">執行診斷</button>
        </form>
        <div id="loader" class="loader hidden">
          <div class="spinner"></div>
          <span>診斷中，請稍候…</span>
        </div>
        <section id="result" class="result hidden"></section>
      </section>

      <section id="panel-cards" class="panel">
        <div class="cards-toolbar">
          <button id="refresh-cards" type="button">重新整理卡片</button>
          <span id="cards-meta"></span>
        </div>
        <div id="cards-loader" class="loader hidden">
          <div class="spinner"></div>
          <span>載入卡片中…</span>
        </div>
        <section id="cards-result" class="result"></section>
      </section>
    </div>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
